# /etc/nginx/sites-available/app
# GitHub Actions tarafından EC2'ye kopyalanır

server {
    listen 80;
    server_name _;   # EC2 IP'si ile eşleşir

    # ── Güvenlik Header'ları ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Sadece Frontend'e erişim (görev gereksinimi) ──────────
    # Tüm trafik frontend container'ına yönlendir
    location / {
        proxy_pass         http://localhost:3000;  # frontend container portu
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Backend API (sadece frontend üzerinden erişilebilir) ──
    # Dışarıdan direkt /api erişimi - görev "yalnızca ön uca izin ver" diyor
    # Bu location bloğunu yoruma alarak BE'yi tamamen dışarıya kapatabilirsiniz
    location /api/ {
        proxy_pass         http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check endpoint (GitHub Actions için) ───────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Doğrudan DB ve BE portlarına dışarıdan erişim engelleme ─
    # (Security Group zaten kapatıyor ama defense-in-depth)
}
